name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Pindah ke folder proyek
          cd "saham_ingestion" || exit 1
          pip install -r requirements.txt
          
      - name: Run Pytest
        run: |
          cd "saham_ingestion" || exit 1
          # Set PYTHONPATH agar Python menemukan modul di folder src/
          PYTHONPATH=src pytest tests/ -v

  build-docker:
    name: Check Dockerfile Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Test Docker Build
        run: |
          # Build image untuk memastikan tidak ada konflik dependensi saat pip install di dalam Dockerfile
          docker build -t ihsg-airflow-test .
